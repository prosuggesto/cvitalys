<!DOCTYPE html>

<!-- This MUST be the very first <style> in <head> so the cream background
     is painted by the WebView before any external CSS, fonts, or scripts
     load. Without it, the WebView paints with its default transparent /
     white background during the ~200-500 ms between Chrome's PWA system
     splash terminating and our preboot div being parsed — and the user
     briefly sees their Android home-screen launcher through the
     transparent WebView. The duplicate inline style on <html> above is
     belt-and-braces (some Android Chrome versions check the root element
     before encountering <head>). -->

<!-- Preload the brand logo so the preboot screen has it ready on first
     paint instead of waiting for the image fetch — the logo is the most
     visible element of the loading state. -->
<link rel="preload" href="assets/logo.png" as="image">

<!-- Pre-rendered loading state — fills the gap on Android between the
     system PWA splash disappearing and React mounting + rendering its
     own <LoadingScreen/>. The visual MUST match <LoadingScreen/> byte-
     for-byte (same cream bg, same Brand layout = logo + "CVitalis"
     text, same spinner) so the transition is invisible. React replaces
     this content when createRoot().render() commits its first paint.
     If the user has a SWR cache, app.jsx starts with loading=false and
     skips LoadingScreen entirely — preboot → app directly. -->
<style>
  .preboot {
    position: fixed; inset: 0;
    background: #F7F3EC;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
    z-index: 9999;
  }
  .preboot__brand {
    display: inline-flex; align-items: center; gap: 12px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-size: 28px;
    color: #1B1814;
    line-height: 1;
  }
  .preboot__logo {
    width: 42px; height: 42px;
    object-fit: contain;
    mix-blend-mode: multiply;
    display: block; flex-shrink: 0;
  }
  .preboot__spinner {
    width: 32px; height: 32px;
    border: 2px solid #ECE5D6;
    border-top-color: #8A6F45;
    border-radius: 50%;
    animation: preboot-spin 0.8s linear infinite;
  }
  @keyframes preboot-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Service Worker registration — silent install, no in-session reload.
     The SW (sw.js) deliberately omits self.clients.claim() so a newly
     installed SW does NOT take over the currently-open page. The page
     finishes its life with the old SW; the new SW takes control on
     the next cold launch when a fresh WebView is created. This avoids
     the "splash → crash → loading screen → app" effect on Android,
     where every code deploy used to force an in-session reload via
     controllerchange. Updates still propagate — just on the next
     cold start, not mid-session. -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(function (reg) { reg.update(); })
      .catch(function (err) { console.warn('[SW] Registration failed:', err); });
  });
}
</script>
