<!-- Service Worker registration — silent auto-update -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then(function (reg) {
        // Check for updates every time the page loads
        reg.update();

        // When a new SW is waiting, activate it silently on next navigation
        reg.addEventListener('updatefound', function () {
          var newWorker = reg.installing;
          newWorker.addEventListener('statechange', function () {
            // New SW installed and waiting → tell it to skip waiting immediately
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage('SKIP_WAITING');
            }
          });
        });
      })
      .catch(function (err) {
        console.warn('[SW] Registration failed:', err);
      });

    // When the SW activates a new version, reload all clients silently
    var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (!refreshing) {
        refreshing = true;
        window.location.reload();
      }
    });
  });
}
</script>
